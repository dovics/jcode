name: Master Build

on:
  push:
    branches:
      - master

concurrency:
  group: master-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  CARGO_INCREMENTAL: "0"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
        id: sccache

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-master
          cache-all-crates: "true"

      - name: Install mold linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mold

      - name: Build
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.x86_64-unknown-linux-gnu]
          linker = "clang"
          rustflags = ["-C", "link-arg=-fuse-ld=mold"]
          EOF
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            export RUSTC_WRAPPER=sccache
          fi
          cargo build --release

      - name: Verify binary
        run: |
          target/release/jcode --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcode-linux-x86_64-master
          path: target/release/jcode
          retention-days: 7
